# ============================================
# Production profile - Azure MySQL
# Values supplied via environment variables
# ============================================
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - fail fast so Azure doesn't hang on first request
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# Run schema once - data already in production
spring.sql.init.mode=never

# Enable Thymeleaf cache in prod
spring.thymeleaf.cache=true

# Minimal logging in prod
logging.level.root=WARN
logging.level.com.alphasolutions=INFO
