# ============================================
# Production profile - Azure MySQL
# Values supplied via environment variables
# ============================================
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Run schema once - data already in production
spring.sql.init.mode=never

# Enable Thymeleaf cache in prod
spring.thymeleaf.cache=true

# Minimal logging in prod
logging.level.root=WARN
logging.level.com.alphasolutions=INFO
