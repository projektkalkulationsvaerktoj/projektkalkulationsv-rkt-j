<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Delprojekt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1>Alpha Solutions</h1>
    <nav>
        <a th:href="@{'/projects/' + ${subProject.projectId}}" class="btn-link">Tilbage</a>
    </nav>
</header>

<main>
    <h2 th:text="${subProject.id == 0 ? 'Nyt Delprojekt' : 'Rediger Delprojekt'}"></h2>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="${subProject.id == 0 ? '/subprojects/new' : '/subprojects/' + subProject.id + '/edit'}"
          th:object="${subProject}" method="post" class="form-card">

        <input type="hidden" th:field="*{projectId}">

        <div class="form-group">
            <label for="name">Navn *</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label for="description">Beskrivelse</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" th:field="*{deadline}">
        </div>

        <button type="submit" class="btn-primary">Gem</button>
    </form>
</main>
</body>
</html>
